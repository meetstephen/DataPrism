# Keep-alive: Prevents Streamlit Cloud from spinning down the app due to inactivity.
# Pings the app URL once daily. Set STREAMLIT_APP_URL in repository secrets.
name: Keep Alive

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6am UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          if [ -n "${{ secrets.STREAMLIT_APP_URL }}" ]; then
            curl -s -o /dev/null -w "%{http_code}" "${{ secrets.STREAMLIT_APP_URL }}" || true
          else
            echo "STREAMLIT_APP_URL secret not set, skipping ping"
          fi
